variables:
  UNITY_CATALOG:
    default: crew_j_te_employee_phone_dw
  UNITY_SCHEMA:
    default: bronze

pipeline:
  job_name: CREW_J_TE_EMPLOYEE_PHONE_DW
  run_mode: full_refresh
  catalog: "${var.UNITY_CATALOG}"
  schema: "${UNITY_SCHEMA}"

source:
  type: jdbc
  table: CREW_WSTELE_LND
  database: "${TD_WORK_DB}"
  jdbc_options:
    url: "${JDBC_URL}"
    dbtable: "${TD_WORK_DB}.CREW_WSTELE_LND"
    driver: "com.teradata.jdbc.TeraDriver"
    fetchsize: 10000
    user: "${JDBC_USER}"
    password: "${JDBC_PASSWORD}"

target:
  table: te_employee_phone
  database: "${TD_DB}"
  full_table: "${UNITY_CATALOG}.${UNITY_SCHEMA}.te_employee_phone"
  write_mode: overwrite
  overwrite_schema: true
  key_columns:
    - EMP_NBR
    - PH_LIST
    - PH_PRTY
  zorder_columns:
    - EMP_NBR

error:
  enabled: true
  table: "${UNITY_CATALOG}.${UNITY_SCHEMA}.te_employee_phone_errors"
  source_columns: all

delta:
  vacuum_retention_hours: 168
  optimize_after_write: true

sort_requirements:
  - stage: NEW_PRTY_TFM
    sort_key: EMP_NBR
  - stage: ABREC_NEW_PRTY_TFM
    sort_key: EMP_NBR
  - stage: ADJUSTING_PRTY_TFM
    sort_key: EMP_NBR
  - stage: ADJUST_PRTY_TFM
    sort_key: EMP_NBR
