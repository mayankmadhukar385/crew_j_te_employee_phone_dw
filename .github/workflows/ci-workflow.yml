name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

jobs:
  ci_job:
    name: CI job
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.18.0

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip --version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8.0.0" "pytest-html>=4.1.1"
          pip install "pylint>=3.2.0" "nbqa>=1.8.0"

      - name: Verify Bazel workspace
        run: |
          pwd
          ls -la
          test -f MODULE.bazel
          test -f BUILD.bazel
      

      - name: Lint Python files with pylint
        run: |
          python -m pylint src

      - name: Lint notebooks with nbqa + pylint
        run: |
          nbqa pylint resources --nbqa-shell

      - name: Run Bazel tests
        run: |
          bazel test //... --test_output=errors

      - name: Upload Bazel test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs
          path: |
            bazel-testlogs
            bazel-out/**/testlogs/**
