target_columns:
  te_employee_phone:
    - name: EMP_NBR
      source: TELE_EMP_NBR
      mapping_type: pass-through
      derivation: "TELE_EMP_NBR AS EMP_NBR (column rename in source SQL)"
    - name: EMP_NO
      source: EMP_NBR
      mapping_type: derived
      derivation: "lpad(trim(EMP_NBR), 9, '0')"
    - name: PH_LIST
      source: constant_per_branch
      mapping_type: constant
      derivation: "EMERGENCY | TEMP | BASIC | HOME | AWAY"
    - name: PH_PRTY
      source: derived
      mapping_type: derived
      derivation: "row_number per EMP_NBR; EMERGENCY/TEMP=1; BASIC=pivot_index+1"
    - name: EFF_START_TM
      source: TELE_HOME_PRI_FROM / constant
      mapping_type: derived
      derivation: "Scheduled: trimleadingtrailing after time-validity. Unscheduled: '0000'/'0001'. Final: HH:MM:00"
    - name: EFF_END_TM
      source: TELE_HOME_PRI_TO / constant
      mapping_type: derived
      derivation: "Scheduled: trimleadingtrailing after time-validity. Unscheduled: '2359'. Final: HH:MM:00"
    - name: PH_NBR
      source: TELE_EMGR/TEMP/PH/ALT_PH_AREA_CD+PREFIX+NUM
      mapping_type: derived
      derivation: "TRIM(BOTH ' ' FROM AREA)||TRIM(BOTH ' ' FROM PREFIX)||TRIM(BOTH ' ' FROM NUM)"
    - name: PH_ACCESS
      source: TELE_PH_ACCESS_CD
      mapping_type: derived
      derivation: "null-clean: if trim(coalesce(X,''))='' or < ' ' then null else trim(coalesce(X,''))"
    - name: PH_COMMENTS
      source: TELE_EMGR_PH_NAME
      mapping_type: derived
      derivation: "null-clean same as PH_ACCESS"
    - name: PH_TYPE
      source: TELE_PH_TYPE_CD
      mapping_type: pass-through
      derivation: "Pivoted from BASIC_PH_TYPE_1-5; NULL for non-BASIC"
    - name: UNLISTD_IND
      source: TELE_PH_UNLISTED_IND
      mapping_type: pass-through
      derivation: "Pivoted from BASIC_PH_UNLIST_CD_1-5; NULL for non-BASIC"
    - name: HOME_AWAY_IND
      source: TELE_PH_HOME_AWAY_CD
      mapping_type: pass-through
      derivation: "Pivoted from BASIC_PH_HOME_AWAY_CD_1-5"
    - name: TEMP_PH_EXP_TS
      source: TELE_TEMP_PH_EXP_DATE + TELE_TEMP_PH_EXP_TIME
      mapping_type: derived
      derivation: "to_timestamp from date+time parts; NULL for non-TEMP"
    - name: TD_LD_TS
      source: system
      mapping_type: constant
      derivation: "CurrentTimestamp()"

pivot:
  basic_phone:
    key_columns:
      - EMP_NBR
      - CALL_LIST
      - EFF_START_TM
      - EFF_END_TM
      - USER_ID
      - UPD_TS
    groups:
      - slot: 1
        columns:
          PH_NBR: BASIC_PH_NBR_1
          PH_ACCESS: BASIC_PH_ACCESS_1
          PH_COMMENTS: BASIC_PH_COMMENT_1
          PH_TYPE: BASIC_PH_TYPE_1
          UNLISTD_IND: BASIC_PH_UNLIST_CD_1
          HOME_AWAY_IND: BASIC_PH_HOME_AWAY_CD_1
          TEMP_PH_EXP_TS: TEMP_PH_EXP_TS_1
      - slot: 2
        columns:
          PH_NBR: BASIC_PH_NBR_2
          PH_ACCESS: BASIC_PH_ACCESS_2
          PH_COMMENTS: BASIC_PH_COMMENT_2
          PH_TYPE: BASIC_PH_TYPE_2
          UNLISTD_IND: BASIC_PH_UNLIST_CD_2
          HOME_AWAY_IND: BASIC_PH_HOME_AWAY_CD_2
          TEMP_PH_EXP_TS: TEMP_PH_EXP_TS_2
      - slot: 3
