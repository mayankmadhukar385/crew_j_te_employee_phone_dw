          PH_NBR: BASIC_PH_NBR_3
          PH_ACCESS: BASIC_PH_ACCESS_3
          PH_COMMENTS: BASIC_PH_COMMENT_3
          PH_TYPE: BASIC_PH_TYPE_3
          UNLISTD_IND: BASIC_PH_UNLIST_CD_3
          HOME_AWAY_IND: BASIC_PH_HOME_AWAY_CD_3
          TEMP_PH_EXP_TS: TEMP_PH_EXP_TS_3
      - slot: 4
        columns:
          PH_NBR: BASIC_PH_NBR_4
          PH_ACCESS: BASIC_PH_ACCESS_4
          PH_COMMENTS: BASIC_PH_COMMENT_4
          PH_TYPE: BASIC_PH_TYPE_4
          UNLISTD_IND: BASIC_PH_UNLIST_CD_4
          HOME_AWAY_IND: BASIC_PH_HOME_AWAY_CD_4
          TEMP_PH_EXP_TS: TEMP_PH_EXP_TS_4
      - slot: 5
