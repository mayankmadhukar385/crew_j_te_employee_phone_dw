routing:
  emergency:
    filter: "ISVALID_INT32(EMP_NBR) AND ISVALID_INT64(PH_NBR)"
    call_list: EMERGENCY
    call_prty: 1
    eff_start_tm: "0000"
    eff_end_tm: "2359"

  temp:
    filter: "ISVALID_INT32(EMP_NBR) AND ISVALID_INT64(TEMP_PH_NBR)"
    call_list: TEMP
    call_prty: 1
    eff_start_tm: "0001"
    eff_end_tm: "2359"

  basic:
    filter: "ISVALID_INT32(EMP_NBR)"
    call_list: BASIC
    eff_start_tm: "0001"
    eff_end_tm: "2359"

  home:
    filter: null  # unconditional
    call_list: HOME

  away:
    filter: null  # unconditional
    call_list: AWAY

  error:
    filter: "NOT ISVALID_INT32(EMP_NBR)"

basic_rec_routing:
  all_direct:
    filter: "ISVALID_INT64(PH_NBR)"
  home_join:
    filter: "ISVALID_INT64(PH_NBR) AND HOME_AWAY_IND IS NOT NULL AND HOME_AWAY_IND IN ('B','H')"
  home_agg:
    filter: "ISVALID_INT64(PH_NBR) AND HOME_AWAY_IND IS NOT NULL AND HOME_AWAY_IND IN ('B','H')"
  away_join:
    filter: "ISVALID_INT64(PH_NBR) AND HOME_AWAY_IND IS NOT NULL AND HOME_AWAY_IND IN ('B','A')"
  away_agg:
    filter: "ISVALID_INT64(PH_NBR) AND HOME_AWAY_IND IS NOT NULL AND HOME_AWAY_IND IN ('B','A')"

null_val_filter:
  ph_nbr: "ISVALID_INT64(PH_NBR)"

emp_no:
  target_length: 9
  pad_char: "0"
